<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Graph Image Generator</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        .canvas-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .controls {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type="color"] {
            width: 100%;
            height: 50px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #D74B4B, #8B3A3A);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(215, 75, 75, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .info {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .info strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Generador de Open Graph Image</h1>
        
        <div class="info">
            <strong>📏 Dimensiones:</strong> Esta herramienta genera imágenes de 1200x630px, el tamaño estándar para Facebook, Instagram y WhatsApp.<br>
            <strong>💾 Uso:</strong> Personaliza el contenido y haz clic en "Descargar Imagen" para guardarla como <code>og-image.jpg</code> en tu carpeta <code>/public/</code>
        </div>

        <div class="canvas-container">
            <canvas id="ogCanvas" width="1200" height="630"></canvas>
        </div>

        <div class="controls">
            <div class="form-group">
                <label for="storeName">Nombre de la tienda:</label>
                <input type="text" id="storeName" value="Bike Marketplace" />
            </div>

            <div class="form-group">
                <label for="storeDescription">Descripción:</label>
                <textarea id="storeDescription">Tienda online para insumos de bicicletas</textarea>
            </div>

            <div class="form-group">
                <label for="tagline">Tagline (opcional):</label>
                <input type="text" id="tagline" value="🚲 Productos de calidad · 📱 Compra por WhatsApp" />
            </div>

            <div class="form-group">
                <label for="bgColor1">Color de fondo 1:</label>
                <input type="color" id="bgColor1" value="#D74B4B" />
            </div>

            <div class="form-group">
                <label for="bgColor2">Color de fondo 2:</label>
                <input type="color" id="bgColor2" value="#3D2424" />
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="updateCanvas()">🔄 Actualizar Vista Previa</button>
                <button class="btn-secondary" onclick="downloadImage()">💾 Descargar Imagen</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ogCanvas');
        const ctx = canvas.getContext('2d');

        function updateCanvas() {
            const storeName = document.getElementById('storeName').value;
            const storeDescription = document.getElementById('storeDescription').value;
            const tagline = document.getElementById('tagline').value;
            const bgColor1 = document.getElementById('bgColor1').value;
            const bgColor2 = document.getElementById('bgColor2').value;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, bgColor1);
            gradient.addColorStop(1, bgColor2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Decorative orbs
            ctx.globalAlpha = 0.15;
            const orbGradient1 = ctx.createRadialGradient(1000, 150, 0, 1000, 150, 300);
            orbGradient1.addColorStop(0, 'white');
            orbGradient1.addColorStop(1, 'transparent');
            ctx.fillStyle = orbGradient1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const orbGradient2 = ctx.createRadialGradient(200, 500, 0, 200, 500, 250);
            orbGradient2.addColorStop(0, 'white');
            orbGradient2.addColorStop(1, 'transparent');
            ctx.fillStyle = orbGradient2;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;

            // Store name
            ctx.fillStyle = 'white';
            ctx.font = 'bold 90px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(storeName, canvas.width / 2, 250);

            // Description
            ctx.font = '40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            
            // Word wrap for description
            const maxWidth = 900;
            const words = storeDescription.split(' ');
            let line = '';
            let y = 340;
            
            words.forEach((word, i) => {
                const testLine = line + word + ' ';
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    ctx.fillText(line, canvas.width / 2, y);
                    line = word + ' ';
                    y += 50;
                } else {
                    line = testLine;
                }
            });
            ctx.fillText(line, canvas.width / 2, y);

            // Tagline
            if (tagline) {
                ctx.font = '32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillText(tagline, canvas.width / 2, y + 100);
            }

            // Decorative line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 150, 180);
            ctx.lineTo(canvas.width / 2 + 150, 180);
            ctx.stroke();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'og-image.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }

        // Auto-update on input
        ['storeName', 'storeDescription', 'tagline', 'bgColor1', 'bgColor2'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateCanvas);
        });

        // Initial draw
        updateCanvas();
    </script>
</body>
</html>
